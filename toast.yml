image: ubuntu:26.04
default: build
user: user
command_prefix: |
  # Make not silently ignore errors.
  set -euo pipefail

  # Load the NVM startup file, if it exists.
  if [ -f "$HOME/.nvm/nvm.sh" ]; then
    export NVM_DIR="$HOME/.nvm"
    . "$HOME/.nvm/nvm.sh"
  fi

  # Make Bash log commands.
  set -x
tasks:
  install_packages:
    description: Install system packages.
    user: root
    command: |
      # Install the following packages:
      #
      # - ca-certificates - Used for installing Node.js and Tagref
      # - curl            - Used for installing Node.js and Tagref
      # - zip             - Used for producing the production release
      apt-get update
      apt-get install --yes ca-certificates curl zip

  install_tagref:
    description: Install Tagref, a reference checking tool.
    dependencies:
      - install_packages
    user: root
    command: |
      # Install Tagref using the official installer script.
      curl https://raw.githubusercontent.com/stepchowfun/tagref/main/install.sh -LSfs | sh

  create_user:
    description: Create a user who doesn't have root privileges.
    user: root
    command: |
      # Create a user named `user` with a home directory and with Bash as the login shell.
      useradd user --create-home --shell /bin/bash

  install_node:
    description: Install Node.js, a JavaScript runtime environment.
    dependencies:
      - install_packages
      - create_user
    command: |
      # Install Node.js via NVM.
      curl -o- https://raw.githubusercontent.com/nvm-sh/nvm/v0.40.3/install.sh | bash
      export NVM_DIR="$HOME/.nvm"
      . "$NVM_DIR/nvm.sh"
      nvm install 24.14.1

  install_tools:
    description: Install the tools needed to build and validate the extension.
    dependencies:
      - create_user
      - install_node
      - install_tagref

  repository:
    description: Import the repository.
    dependencies:
      - install_tools
    input_paths:
      - .
    excluded_input_paths:
      - .git

      # [tag:excluded_input_paths] Keep this in sync with [file:.gitignore].
      - dist/
      - hashpass.zip
      - node_modules/
      - website/

  build:
    description: Build the extension.
    dependencies:
      - repository
    command: |
      # Build the extension.
      npm ci
      npm run build

  test:
    description: Run the test suite.
    dependencies:
      - build
    command: |
      # Run the tests.
      npm test

  lint:
    description: Run the linters.
    dependencies:
      - build
    command: |
      # Check formatting, lint, and check types.
      npm run check

      # Check references with Tagref.
      tagref
      tagref list-unused --fail-if-any

  run:
    description: Run the extension.
    dependencies:
      - build
    command: |
      # The extension can't meaningfully be "run" headlessly in a container. To try it out, run
      # `toast release`, unzip `hashpass.zip`, and load it into Chrome via `chrome://extensions`
      # with `Developer mode` enabled and the `Load unpacked` option.
      echo 'There is nothing to run in a container; see the comment in this task in toast.yml.'

  format:
    description: Format the source code.
    dependencies:
      - build
    output_paths:
      - .github
      - index.html
      - package.json
      - public
      - src
      - tsconfig.json
      - vite.config.ts
    command: |
      # Format the source code.
      npm run format

  release:
    description: Build the production release.
    dependencies:
      - build
    output_paths:
      - hashpass.zip
      - website
    command: |
      # Include the licenses in the build output.
      cp HEROICONS-LICENSE.md LICENSE.md dist

      # Create a directory containing the relevant files for the website. The extension manifest
      # is not needed there.
      mkdir website
      cp -R dist/. website
      rm website/manifest.json

      # Create a ZIP file containing the built extension. The manifest must be at the root of the
      # archive, so the contents of `dist` are zipped rather than the directory itself.
      (cd dist && zip -r ../hashpass.zip .)

      # Inform the user of where the artifacts are.
      echo 'Generated `website` and `hashpass.zip`.'
